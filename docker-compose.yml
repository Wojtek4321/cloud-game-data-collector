services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app/api
    env_file:
      - .env

  generator:
    build:
      context: .
      dockerfile: generator/Dockerfile
    depends_on:
      - api
    env_file:
      - .env